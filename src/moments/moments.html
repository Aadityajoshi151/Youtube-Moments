<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Moments</title>
    <link rel="icon" href="../../icons/icon.svg" />
    <link rel="stylesheet" href="moments.css" />
  </head>
  <body>
    <!-- Icon sprite -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <symbol id="i-search" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.5" y2="16.5"></line>
        </symbol>
        <symbol id="i-import" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </symbol>
        <symbol id="i-export" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </symbol>
        <symbol id="i-edit" viewBox="0 0 24 24">
          <path
            d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"
          ></path>
        </symbol>
        <symbol id="i-add" viewBox="0 0 24 24">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </symbol>
        <symbol id="i-copy" viewBox="0 0 24 24">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path
            d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
          ></path>
        </symbol>
        <symbol id="i-delete" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path
            d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
          ></path>
          <line x1="10" y1="11" x2="10" y2="17"></line>
          <line x1="14" y1="11" x2="14" y2="17"></line>
        </symbol>
        <symbol id="i-github" viewBox="0 0 24 24">
          <path
            d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
          ></path>
        </symbol>
      </defs>
    </svg>

    <div class="wrap">
      <header class="head">
        <div class="head__title">
          <img class="logo" src="../../icons/icon.svg" alt="" />
          <h1>YouTube Moments</h1>
          <span id="count" class="count">Loading…</span>
        </div>
        <div class="head__tools">
          <span class="search-wrap">
            <svg class="icon" aria-hidden="true">
              <use href="#i-search"></use>
            </svg>
            <input
              id="search"
              class="search"
              type="search"
              placeholder="Search labels and titles"
              autocomplete="off"
              spellcheck="false"
            />
          </span>
          <button id="import" class="btn-outline" type="button">
            <svg class="icon" aria-hidden="true">
              <use href="#i-import"></use>
            </svg>
            <span>Import JSON</span>
          </button>
          <button id="export" class="btn-outline" type="button">
            <svg class="icon" aria-hidden="true">
              <use href="#i-export"></use>
            </svg>
            <span>Export JSON</span>
          </button>
          <input
            id="importFile"
            type="file"
            accept="application/json,.json"
            hidden
          />
        </div>
      </header>

      <p id="status" class="status" role="status" hidden></p>

      <main>
        <ul id="list" class="list" aria-live="polite"></ul>
        <nav id="pager" class="pager" aria-label="Pagination" hidden></nav>
        <div id="empty" class="empty" hidden></div>
      </main>

      <footer class="foot">
        <span>YouTube Moments</span>
        <a
          href="https://github.com/Aadityajoshi151/Youtube-Moments"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg class="icon icon--fill" aria-hidden="true">
            <use href="#i-github"></use>
          </svg>
          <span>GitHub Repo</span>
        </a>
      </footer>
    </div>
    <script src="moments.js"></script>
  </body>
</html>
